# Prod infrastructure apply — provisions or updates prod AWS resources.
# Always run infra-prod-plan first and have changes reviewed.
#
# After apply, reads the ESO role ARN from Terraform outputs and installs
# External Secrets Operator on the cluster — no ESO_ROLE_ARN secret required.
# Manually triggered only. Requires approval from the "prod" GitHub Environment
# before the apply job runs.
#
# Required GitHub secrets (prod environment):
#   AWS_DEPLOY_ROLE_ARN  — IAM role ARN for OIDC auth
#
# Required GitHub variables:
#   AWS_REGION           — e.g. ca-central-1

name: Infra Prod — Apply

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod   # manual approval gate — configure required reviewers in GitHub
    outputs:
      eso_role_arn: ${{ steps.tf-outputs.outputs.eso_role_arn }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.1/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terragrunt apply
        working-directory: infra/environments/prod
        run: terragrunt run --all apply --non-interactive -- -auto-approve

      - name: Read ESO role ARN from Terraform outputs
        id: tf-outputs
        working-directory: infra/environments/prod/iam
        run: |
          echo "eso_role_arn=$(terragrunt output -raw external_secrets_role_arn)" >> "$GITHUB_OUTPUT"

  install-controllers:
    needs: apply
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name shopstream-prod

      - name: Grant deploy role EKS cluster-admin access
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/shopstream-prod-github-actions-deploy"

          CURRENT_MODE=$(aws eks describe-cluster \
            --name shopstream-prod \
            --region ${{ vars.AWS_REGION }} \
            --query 'cluster.accessConfig.authenticationMode' --output text)
          if [ "$CURRENT_MODE" != "API_AND_CONFIG_MAP" ] && [ "$CURRENT_MODE" != "API" ]; then
            aws eks update-cluster-config \
              --name shopstream-prod \
              --region ${{ vars.AWS_REGION }} \
              --access-config authenticationMode=API_AND_CONFIG_MAP
            sleep 20
            aws eks wait cluster-active \
              --name shopstream-prod \
              --region ${{ vars.AWS_REGION }}
          fi

          aws eks create-access-entry \
            --cluster-name shopstream-prod \
            --region ${{ vars.AWS_REGION }} \
            --principal-arn "$ROLE_ARN" 2>/dev/null || true

          aws eks associate-access-policy \
            --cluster-name shopstream-prod \
            --region ${{ vars.AWS_REGION }} \
            --principal-arn "$ROLE_ARN" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster

          sleep 15

      - name: Install External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${{ needs.apply.outputs.eso_role_arn }}" \
            --wait \
            --timeout 5m

  notify:
    needs: [apply, install-controllers]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      workflow: "Infra Prod — Apply"
      environment: prod
      ref: ${{ github.sha }}
    secrets: inherit
