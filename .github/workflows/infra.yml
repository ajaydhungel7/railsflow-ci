# Infrastructure pipeline — plan on PRs, apply on merge.
# Branch determines the target environment:
#   dev     → infra/environments/dev
#   staging → infra/environments/staging
#   main    → infra/environments/prod    (requires manual approval)
#
# All three environments use the same module configs — only env.hcl differs.
# To add a new environment: create infra/environments/<name>/env.hcl and a new branch.
#
# Required GitHub secrets (per environment):
#   AWS_DEPLOY_ROLE_ARN  — IAM role ARN for OIDC auth (set per GitHub Environment)
#   ESO_ROLE_ARN         — IAM role ARN for External Secrets Operator IRSA
#   SLACK_WEBHOOK_URL    — Slack notifications
#
# Required GitHub variables:
#   AWS_REGION           — e.g. ca-central-1
#
# GitHub Environments required:
#   dev     — no approval gate
#   staging — no approval gate (add reviewers when ready)
#   prod    — required reviewers configured

name: Infra

on:
  push:
    branches: [dev, staging, main]
    paths: ["infra/**"]
  pull_request:
    branches: [dev, staging, main]
    paths: ["infra/**"]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    # Use the target branch environment so the plan uses the correct AWS role.
    environment: ${{ (github.base_ref == 'main' || github.ref_name == 'main') && 'prod' || (github.base_ref == 'staging' || github.ref_name == 'staging') && 'staging' || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          # For PRs use the base branch; for pushes use the branch itself.
          BRANCH="${{ github.base_ref || github.ref_name }}"
          case "$BRANCH" in
            main)    echo "name=prod"; echo "dir=prod" ;;
            staging) echo "name=staging";    echo "dir=staging" ;;
            *)       echo "name=dev";        echo "dir=dev" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Install Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.1/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terragrunt plan
        working-directory: infra/environments/${{ steps.env.outputs.dir }}
        run: terragrunt run --all plan --non-interactive

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terragrunt Plan — ${{ steps.env.outputs.name }}\nPlan complete. [View full output](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
            })

  apply:
    if: github.event_name == 'push'
    needs: plan
    runs-on: ubuntu-latest
    # Maps branch → GitHub Environment, enforcing approval rules configured there.
    # prod environment requires manual reviewer approval before this job runs.
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve infra directory
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "dir=prod" ;;
            staging) echo "dir=staging" ;;
            *)       echo "dir=dev" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Install Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.1/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terragrunt apply
        working-directory: infra/environments/${{ steps.env.outputs.dir }}
        run: terragrunt run --all apply --non-interactive -- -auto-approve

  install-controllers:
    if: github.event_name == 'push'
    needs: apply
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - name: Resolve environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "name=prod";      echo "cluster=shopstream-prod" ;;
            staging) echo "name=staging"; echo "cluster=shopstream-staging" ;;
            *)       echo "name=dev";     echo "cluster=shopstream-dev" ;;
          esac >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ steps.env.outputs.cluster }}

      - name: Grant deploy role EKS cluster-admin access
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${{ steps.env.outputs.cluster }}-github-actions-deploy"

          CURRENT_MODE=$(aws eks describe-cluster \
            --name ${{ steps.env.outputs.cluster }} \
            --region ${{ vars.AWS_REGION }} \
            --query 'cluster.accessConfig.authenticationMode' --output text)
          if [ "$CURRENT_MODE" != "API_AND_CONFIG_MAP" ] && [ "$CURRENT_MODE" != "API" ]; then
            aws eks update-cluster-config \
              --name ${{ steps.env.outputs.cluster }} \
              --region ${{ vars.AWS_REGION }} \
              --access-config authenticationMode=API_AND_CONFIG_MAP
            sleep 20
            aws eks wait cluster-active \
              --name ${{ steps.env.outputs.cluster }} \
              --region ${{ vars.AWS_REGION }}
          fi

          aws eks create-access-entry \
            --cluster-name ${{ steps.env.outputs.cluster }} \
            --region ${{ vars.AWS_REGION }} \
            --principal-arn "$ROLE_ARN" 2>/dev/null || true

          aws eks associate-access-policy \
            --cluster-name ${{ steps.env.outputs.cluster }} \
            --region ${{ vars.AWS_REGION }} \
            --principal-arn "$ROLE_ARN" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster

          sleep 15

      - name: Install External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${{ secrets.ESO_ROLE_ARN }}" \
            --wait \
            --timeout 5m

  notify:
    needs: [plan, apply, install-controllers]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      workflow: Infra
      environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
      ref: ${{ github.sha }}
    secrets: inherit
