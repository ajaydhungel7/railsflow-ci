# Infrastructure workflow — plan on PRs, apply dev on merge, apply prod after manual approval.
# Triggered only when files under infra/ change.
# RDS password is managed by AWS Secrets Manager — no DB_PASSWORD secret needed.
#
# Required GitHub secrets (bootstrapped manually on first run, auto-synced after):
#   AWS_DEPLOY_ROLE_ARN_DEV  — IAM role ARN for dev OIDC auth
#   AWS_DEPLOY_ROLE_ARN_PROD — IAM role ARN for prod OIDC auth
#   SLACK_WEBHOOK_URL        — Slack notifications
#
# Required GitHub variables:
#   AWS_REGION               — e.g. ca-central-1
#
# GitHub Environments required:
#   dev        — no approval gate
#   production — required reviewers configured

name: Infra

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  pull_request:
    paths: ["infra/**"]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan-dev:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Install Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.1/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terragrunt plan
        run: terragrunt run --all plan --non-interactive

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terragrunt Plan — dev\nPlan complete. [View full output](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
            })

  plan-prod:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/environments/prod

    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Install Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.1/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terragrunt plan
        run: terragrunt run --all plan --non-interactive

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terragrunt Plan — prod\nPlan complete. [View full output](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
            })

  apply-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: plan-dev
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra/environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Install Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.1/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terragrunt apply
        run: terragrunt run --all apply --non-interactive -- -auto-approve

  install-controllers-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: apply-dev
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name shopstream-dev

      - name: Grant deploy role EKS cluster-admin access
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/shopstream-dev-github-actions-deploy"

          # Switch authentication mode to API_AND_CONFIG_MAP (idempotent — safe to re-run)
          CURRENT_MODE=$(aws eks describe-cluster --name shopstream-dev --region ${{ vars.AWS_REGION }} \
            --query 'cluster.accessConfig.authenticationMode' --output text)
          if [ "$CURRENT_MODE" != "API_AND_CONFIG_MAP" ] && [ "$CURRENT_MODE" != "API" ]; then
            aws eks update-cluster-config --name shopstream-dev --region ${{ vars.AWS_REGION }} \
              --access-config authenticationMode=API_AND_CONFIG_MAP
            aws eks wait cluster-active --name shopstream-dev --region ${{ vars.AWS_REGION }}
          fi

          # Create access entry (ignore error if already exists)
          aws eks create-access-entry --cluster-name shopstream-dev --region ${{ vars.AWS_REGION }} \
            --principal-arn "$ROLE_ARN" 2>/dev/null || true

          # Associate cluster-admin policy
          aws eks associate-access-policy --cluster-name shopstream-dev --region ${{ vars.AWS_REGION }} \
            --principal-arn "$ROLE_ARN" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster 2>/dev/null || true

      - name: Install External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${{ secrets.ESO_ROLE_ARN_DEV }}" \
            --wait \
            --timeout 5m

  apply-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.install-controllers-dev.result == 'success'
    needs: install-controllers-dev
    runs-on: ubuntu-latest
    environment: production  # manual approval gate configured in GitHub Environment settings
    defaults:
      run:
        working-directory: infra/environments/prod

    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Install Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.1/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terragrunt apply
        run: terragrunt run --all apply --non-interactive -- -auto-approve

  install-controllers-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: apply-prod
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name shopstream-prod

      - name: Install External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${{ secrets.ESO_ROLE_ARN_PROD }}" \
            --wait \
            --timeout 5m

  notify:
    needs: [plan-dev, apply-dev, install-controllers-dev]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      workflow: Infra
      environment: dev
      ref: ${{ github.sha }}
    secrets: inherit
