# Staging deployment pipeline — runs on push to the staging branch.
# Promotes the current 'dev' image to staging — no rebuild.
# The same binary that passed dev is what gets deployed here.
#
# Flow: promote (dev → staging) → migrate → helm deploy
#
# To deploy a specific build instead of the latest dev image,
# use workflow_dispatch and provide an explicit image_tag.
#
# Required GitHub secrets (staging environment):
#   AWS_DEPLOY_ROLE_ARN  — IAM role ARN for OIDC auth
#   SLACK_WEBHOOK_URL    — Slack notifications
#
# Required GitHub variables:
#   AWS_REGION           — e.g. ca-central-1

name: Deploy Staging

on:
  push:
    branches: [staging]
    paths-ignore:
      - "infra/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR tag to promote and deploy (default: dev)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      # Default to 'dev' so staging always promotes whatever is currently blessed in dev.
      # Override via workflow_dispatch to deploy a specific tag or SHA.
      image_tag: ${{ inputs.image_tag || 'dev' }}
    secrets: inherit

  notify:
    needs: [deploy]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
      workflow: "Deploy Staging"
      environment: staging
      ref: ${{ inputs.image_tag || 'dev' }}
    secrets: inherit
