# Infrastructure plan — shows what Terraform would change.
#
# Automatic triggers:
#   push to dev     (infra/**) → plans dev environment
#   push to staging (infra/**) → plans staging environment
#   PR to main      (infra/**) → plans prod environment, comments output on PR
#
# Manual trigger (workflow_dispatch):
#   Pick any environment from the dropdown regardless of branch.
#
# Required GitHub secrets (scoped per environment):
#   AWS_DEPLOY_ROLE_ARN  — IAM role ARN for OIDC auth
#
# Required GitHub variables:
#   AWS_REGION           — e.g. ca-central-1

name: Infra — Plan

on:
  push:
    branches: [dev, staging]
    paths: ["infra/**"]
  pull_request:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan"
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    # On push: use the branch name as the environment.
    # On PR to main: use prod.
    # On manual: use the dropdown selection.
    environment: >-
      ${{
        github.event_name == 'workflow_dispatch' && inputs.environment ||
        github.base_ref == 'main' && 'prod' ||
        github.ref_name == 'staging' && 'staging' ||
        'dev'
      }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.base_ref }}" = "main" ]; then
            echo "name=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "name=staging" >> "$GITHUB_OUTPUT"
          else
            echo "name=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Install Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.1/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terragrunt plan
        working-directory: infra/environments/${{ steps.env.outputs.name }}
        run: terragrunt run --all plan --non-interactive

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terragrunt Plan — ${{ steps.env.outputs.name }}\nPlan complete. [View full output](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
            })
