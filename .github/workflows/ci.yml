# CI pipeline — the only place code is tested and images are built.
# Flow: test → build image → security scan → deploy dev
#
# Images built here are promoted (never rebuilt) to staging and prod.
# Staging promotion is handled by staging.yml (merge dev → staging).
# Prod promotion is handled by prod.yml (merge staging → main).
#
# Required GitHub secrets:
#   AWS_DEPLOY_ROLE_ARN    — IAM role ARN for OIDC auth
#   SLACK_WEBHOOK_URL      — Slack notifications
#
# Required GitHub variables:
#   AWS_REGION             — e.g. ca-central-1
#   BRAKEMAN_OUTPUT_FORMAT — e.g. text (optional, defaults to text)

name: CI — Test · Build · Deploy Dev

on:
  push:
    branches: [dev]
    paths-ignore:
      - "infra/**"
      - "**.md"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shopstream-api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shopstream
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: shopstream_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://shopstream:testpassword@localhost:5432/shopstream_test

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler-cache: true
          working-directory: shopstream-api

      - name: Setup DB
        run: bundle exec rails db:schema:load

      - name: Run tests
        run: bundle exec rails test

      - name: Run linter
        run: bundle exec rubocop --format github

  build:
    needs: test
    uses: ./.github/workflows/build-image.yml
    with:
      image_tag: ${{ github.sha }}
    secrets: inherit

  security:
    needs: build
    uses: ./.github/workflows/security-scan.yml
    with:
      image_tag: ${{ github.sha }}
    secrets: inherit

  deploy-dev:
    needs: security
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      image_tag: ${{ github.sha }}
    secrets: inherit

  notify:
    needs: [test, build, security, deploy-dev]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      status: ${{ contains(needs.*.result, 'failure') && 'failure' || (contains(needs.*.result, 'cancelled') && 'cancelled' || 'success') }}
      workflow: CI
      ref: ${{ github.sha }}
    secrets: inherit
