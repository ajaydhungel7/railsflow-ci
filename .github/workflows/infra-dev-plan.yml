# Dev infrastructure plan — shows what Terraform would change.
# Run this before applying to review changes.
#
# Triggers automatically on push to dev when infra files change.
# Also manually triggerable via workflow_dispatch.
#
# Required GitHub secrets (dev environment):
#   AWS_DEPLOY_ROLE_ARN  — IAM role ARN for OIDC auth
#
# Required GitHub variables:
#   AWS_REGION           — e.g. ca-central-1

name: Infra Dev — Plan

on:
  push:
    branches: [dev]
    paths: ["infra/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Install Terragrunt
        run: |
          curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v0.99.1/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terragrunt plan
        working-directory: infra/environments/dev
        run: terragrunt run --all plan --non-interactive
