# Rollback workflow: re-deploys a known-good image tag to the specified environment.
# Triggered automatically by canary.yml on elevated errors, or manually via workflow_dispatch.
# The last successful image tag must be provided explicitly — no magic version detection.

name: Rollback — Redeploy Known-Good Image

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to roll back"
        required: true
        type: choice
        options: [dev, staging, prod]
      image_tag:
        description: "Known-good image tag (commit SHA) to restore"
        required: true
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name shopstream-${{ inputs.environment }}

      - name: Rollback via Helm
        run: |
          helm upgrade --install shopstream helm/shopstream \
            --namespace shopstream \
            --values helm/shopstream/values-${{ inputs.environment }}.yaml \
            --set image.repository="${{ steps.login-ecr.outputs.registry }}/shopstream" \
            --set image.tag="${{ inputs.image_tag }}" \
            --atomic \
            --timeout 5m
          echo "Rolled back ${{ inputs.environment }} to ${{ inputs.image_tag }}"

  notify:
    needs: rollback
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      status: ${{ needs.rollback.result }}
      workflow: Rollback
      environment: ${{ inputs.environment }}
      ref: ${{ inputs.image_tag }}
      message: "Rolled back to `${{ inputs.image_tag }}`"
    secrets: inherit
