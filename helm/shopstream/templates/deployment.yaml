apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shopstream.fullname" . }}
  labels:
    {{- include "shopstream.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "shopstream.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shopstream.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when image tag changes
        rollme: {{ .Values.image.tag | quote }}
    spec:
      containers:
        - name: shopstream
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DATABASE_URL
            - name: RAILS_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: RAILS_MASTER_KEY
          livenessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
